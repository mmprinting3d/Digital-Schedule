<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Study Schedule</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --accent: #f59e0b;
            --success: #10b981;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(135deg, var(--primary), #1d4ed8);
            color: white;
            padding: 40px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .status-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-top: 10px;
            font-weight: bold;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .info-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .info-card h3 {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--secondary);
            margin-bottom: 5px;
        }

        .info-card p {
            font-weight: bold;
            color: var(--primary);
        }

        .goals-section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 1px solid var(--border);
        }

        .goals-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            color: var(--primary);
        }

        .goal-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .tag {
            background: #eff6ff;
            color: #1e40af;
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            border: 1px solid #dbeafe;
        }

        .schedule-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .task-item {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .task-item.active {
            border-color: var(--primary);
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
            transform: translateX(10px);
            background: #f0f7ff;
        }

        .task-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 5px;
            background: var(--primary);
        }

        .task-time {
            min-width: 110px;
            font-weight: bold;
            color: var(--secondary);
            font-variant-numeric: tabular-nums;
        }

        .task-content {
            flex-grow: 1;
        }

        .task-title {
            font-weight: 600;
            color: var(--text);
        }

        .task-sub {
            font-size: 0.85rem;
            color: var(--secondary);
            margin-top: 2px;
        }

        .upcoming-label {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.7rem;
            background: var(--accent);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: bold;
            display: none;
        }

        .task-item.active .upcoming-label {
            display: block;
            background: var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        footer {
            margin-top: 40px;
            text-align: center;
            color: var(--secondary);
            font-size: 0.9rem;
        }

        .october-alert {
            margin-top: 15px;
            background: #fffbeb;
            border: 1px solid #fef3c7;
            color: #92400e;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        @media (max-width: 600px) {
            .info-grid {
                grid-template-columns: 1fr;
            }
            .task-item {
                flex-direction: column;
                align-items: flex-start;
            }
            .task-time {
                margin-bottom: 5px;
            }
            .task-item.active {
                transform: none;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Digital Study Schedule</h1>
        <div id="phase-badge" class="status-badge">Detecting Phase...</div>
        
        <div class="info-grid">
            <div class="info-card">
                <h3>Current Time</h3>
                <p id="clock">00:00:00</p>
            </div>
            <div class="info-card">
                <h3>Current Date</h3>
                <p id="date-display">--/--/--</p>
            </div>
        </div>

        <div class="october-alert">
            <i class="fas fa-calendar-check"></i>
            <span>Reminder: Open External File (תיק אקסטרני) in <strong>October 2026</strong></span>
        </div>
    </header>

    <section class="goals-section">
        <div class="goals-title">
            <i class="fas fa-bullseye"></i>
            <h2>Bagrut Goals</h2>
        </div>
        <div style="margin-bottom: 15px;">
            <strong style="font-size: 0.9rem; color: var(--secondary);">WINTER (JAN/FEB)</strong>
            <div class="goal-tags">
                <span class="tag">English 5U</span>
                <span class="tag">Hebrew 2U</span>
                <span class="tag">Bible 2U</span>
                <span class="tag">History 2U</span>
            </div>
        </div>
        <div>
            <strong style="font-size: 0.9rem; color: var(--secondary);">SUMMER (MAY/JUN)</strong>
            <div class="goal-tags">
                <span class="tag">Math 5U</span>
                <span class="tag">Physics 5U</span>
            </div>
        </div>
    </section>

    <div id="schedule-container" class="schedule-list">
        <!-- Schedule items will be injected here by JS -->
    </div>

    <footer>
        <p>&copy; 2026 Bagrut Preparation System</p>
    </footer>
</div>

<script>
    const scheduleData = [
        { start: "07:30", end: "08:10", title: "Prayer", sub: "Start the day with focus" },
        { start: "08:10", end: "08:20", title: "Short break", sub: "Stretch and refresh" },
        { start: "08:20", end: "09:00", title: "Breakfast", sub: "Fuel up for the day" },
        { start: "09:00", end: "10:00", title: "Free / Light Start", sub: "Get ready for learning" },
        { start: "10:00", end: "11:30", title: "Math (Learning)", sub: "Khan Academy - New Topic" },
        { start: "11:30", end: "11:40", title: "Break", sub: "Quick rest" },
        { start: "11:40", end: "12:30", title: "Math (Practice)", sub: "Math Gemini - Same Topic" },
        { start: "12:30", end: "13:10", title: "Treadmill", sub: "Exercise session" },
        { start: "13:10", end: "13:45", title: "Lunch", sub: "Midday break" },
        { start: "13:45", end: "14:45", title: "Math (Fix Mistakes)", sub: "Redo errors & strengthen weak areas" },
        { start: "14:45", end: "15:00", title: "Break", sub: "Quick rest" },
        { start: "15:00", end: "16:15", title: "Rotating Subject", sub: "Dynamic - See day" },
        { start: "16:15", end: "17:00", title: "Fix Mistakes", sub: "From second subject" }
    ];

    const rotatingPhase1 = {
        0: "English", // Sunday
        1: "Hebrew",  // Monday
        2: "English", // Tuesday
        3: "תנ\"ך",   // Wednesday
        4: "History"  // Thursday
    };

    const rotatingPhase2 = {
        0: "English", // Sunday
        1: "Hebrew",  // Monday
        2: "History", // Tuesday
        3: "תנ\"ך",   // Wednesday
        4: "Physics"  // Thursday
    };

    function updateApp() {
        const now = new Date();
        const day = now.getDay(); // 0 is Sunday
        const timeStr = now.toTimeString().substring(0, 5);
        
        // Display clock
        document.getElementById('clock').innerText = now.toLocaleTimeString();
        document.getElementById('date-display').innerText = now.toLocaleDateString();

        // Phase Logic
        const phase1Start = new Date('2026-04-18');
        const phase1End = new Date('2026-05-28');
        const phase2Start = new Date('2026-05-31');
        const phase2End = new Date('2026-08-06');

        let phase = 1;
        const phaseBadge = document.getElementById('phase-badge');

        if (now >= phase1Start && now <= phase1End) {
            phase = 1;
            phaseBadge.innerText = "PHASE 1 (APR 18 - MAY 28)";
        } else if (now >= phase2Start && now <= phase2End) {
            phase = 2;
            phaseBadge.innerText = "PHASE 2 (MAY 31 - AUG 06)";
        } else if (now > phase1End && now < phase2Start) {
            phaseBadge.innerText = "TRANSITION PERIOD";
            phase = 1; // Default to P1 layout during gap
        } else if (now < phase1Start) {
            phaseBadge.innerText = "PRE-PHASE 1";
            phase = 1;
        } else {
            phaseBadge.innerText = "SCHEDULE COMPLETE";
        }

        const rotating = phase === 1 ? rotatingPhase1 : rotatingPhase2;
        const container = document.getElementById('schedule-container');
        container.innerHTML = '';

        scheduleData.forEach(task => {
            const isActive = timeStr >= task.start && timeStr < task.end;
            
            let displayTitle = task.title;
            let displaySub = task.sub;

            // Handle rotating subject slot
            if (task.title === "Rotating Subject") {
                const subject = rotating[day] || "Rest / Review";
                displayTitle = `Rotating: ${subject}`;
                displaySub = `Specific focus for ${new Intl.DateTimeFormat('en-US', {weekday: 'long'}).format(now)}`;
            }

            const item = document.createElement('div');
            item.className = `task-item ${isActive ? 'active' : ''}`;
            item.innerHTML = `
                <div class="task-time">${task.start} – ${task.end}</div>
                <div class="task-content">
                    <div class="task-title">${displayTitle}</div>
                    <div class="task-sub">${displaySub}</div>
                </div>
                <div class="upcoming-label">${isActive ? 'Current' : ''}</div>
            `;
            container.appendChild(item);
        });

        // Sunday through Thursday are work days in Israel
        if (day === 5 || day === 6) {
            container.innerHTML = `
                <div class="info-card" style="width: 100%; padding: 40px;">
                    <i class="fas fa-couch" style="font-size: 2rem; color: var(--secondary); margin-bottom: 15px;"></i>
                    <h3>Weekend Mode</h3>
                    <p>Take a break and recharge for next week!</p>
                </div>
            `;
        }
    }

    // Update every second
    setInterval(updateApp, 1000);
    updateApp();
</script>

</body>
</html>
